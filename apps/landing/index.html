<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fintutto Translator - Die Übersetzungsplattform für Tourismus, Events, Migration und Alltag. 45 Sprachen, Offline-fähig, Live-Sessions." />
    <title>Fintutto Translator - Die Übersetzungsplattform</title>
    <meta name="theme-color" content="#0369a1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Clean up stale service workers that may block page loading on iOS
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(r) { r.unregister() })
        })
        if (window.caches) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name) })
          })
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
