name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (critical/high)
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          # Fail if common API key patterns are found in source files
          if grep -rE '(AIzaSy[a-zA-Z0-9_-]{33}|sk_live_[a-zA-Z0-9]{24,}|whsec_[a-zA-Z0-9]{20,})' \
            --include='*.ts' --include='*.tsx' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::Hardcoded secrets detected in source code!"
            exit 1
          fi
          echo "No hardcoded secrets found."

  lighthouse:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .lighthouserc.json
        continue-on-error: true
