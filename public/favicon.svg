<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
   viewBox="0 0 1024 1024" width="32" height="32">
  <defs>
    <linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
