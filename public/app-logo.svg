<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Animated ring gradient -->
    <linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#E879F9;#10B981;#F97316;#2563EB" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%" stop-color="#14B8A6">
        <animate attributeName="stop-color" values="#14B8A6;#2563EB;#E879F9;#84CC16;#14B8A6" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#EAB308">
        <animate attributeName="stop-color" values="#EAB308;#14B8A6;#2563EB;#E879F9;#EAB308" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" stop-color="#E879F9">
        <animate attributeName="stop-color" values="#E879F9;#F97316;#14B8A6;#2563EB;#E879F9" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#E879F9;#10B981;#F97316;#2563EB" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Quadrant gradients - Top-Right: Peach -->
    <radialGradient id="q-tr" cx="0.7" cy="0.3" r="0.8" fx="0.8" fy="0.2">
      <stop offset="0%" stop-color="#FFB090"/>
      <stop offset="30%" stop-color="#e08070"/>
      <stop offset="55%" stop-color="#8a4068"/>
      <stop offset="80%" stop-color="#2d1850"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>

    <!-- Top-Left: Coral -->
    <radialGradient id="q-tl" cx="0.3" cy="0.3" r="0.8" fx="0.2" fy="0.2">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="30%" stop-color="#e05050"/>
      <stop offset="55%" stop-color="#903050"/>
      <stop offset="80%" stop-color="#2d1850"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>

    <!-- Bottom-Left: Gold -->
    <radialGradient id="q-bl" cx="0.3" cy="0.7" r="0.8" fx="0.2" fy="0.8">
      <stop offset="0%" stop-color="#F0C830"/>
      <stop offset="30%" stop-color="#d4a030"/>
      <stop offset="55%" stop-color="#8a4048"/>
      <stop offset="80%" stop-color="#2d1850"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>

    <!-- Bottom-Right: Pink -->
    <radialGradient id="q-br" cx="0.7" cy="0.7" r="0.8" fx="0.8" fy="0.8">
      <stop offset="0%" stop-color="#F088B0"/>
      <stop offset="30%" stop-color="#d068a0"/>
      <stop offset="55%" stop-color="#6a3080"/>
      <stop offset="80%" stop-color="#2d1850"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-0.15" y="-0.15" width="1.3" height="1.3">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-strong" x="-0.3" y="-0.3" width="1.6" height="1.6">
      <feGaussianBlur stdDeviation="10" result="blur1">
        <animate attributeName="stdDeviation" values="10;14;10" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feGaussianBlur stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded rectangle clip -->
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background with rounded corners -->
  <g clip-path="url(#rounded)">
    <!-- Four quadrant backgrounds -->
    <rect x="0"   y="0"   width="256" height="256" fill="url(#q-tl)"/>
    <rect x="256" y="0"   width="256" height="256" fill="url(#q-tr)"/>
    <rect x="0"   y="256" width="256" height="256" fill="url(#q-bl)"/>
    <rect x="256" y="256" width="256" height="256" fill="url(#q-br)"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="30" filter="url(#glow-strong)" opacity="0.2">
    <animate attributeName="opacity" values="0.12;0.28;0.12" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Middle ring with glow -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="20" filter="url(#glow)" opacity="0.45">
    <animate attributeName="opacity" values="0.3;0.55;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Dashed rotating ring -->
  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#ring)" stroke-width="12" opacity="0.4" stroke-dasharray="25 12.5" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="25s" repeatCount="indefinite"/>
  </circle>

  <!-- Reverse dashed ring -->
  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.25" stroke-dasharray="12.5 25" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="360 256 256" to="0 256 256" dur="35s" repeatCount="indefinite"/>
  </circle>

  <!-- Solid inner ring -->
  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#ring)" stroke-width="12" opacity="0.7"/>

  <!-- Center "F" letter for Fintutto -->
  <text x="256" y="280" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="120" font-weight="700" fill="white" opacity="0.95" filter="url(#glow)">F</text>
</svg>
